<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Galerie | Tour26</title>
    <link rel="stylesheet" href="styles/touren.css" />
    <link rel="stylesheet" href="styles/gallery.css" />
    <link rel="icon" href="assets/logo/tour26-favicon.png" />

    <script src="utils.js" defer></script>
    <script type="module" src="auth/authManager.js" defer></script>
    <script type="module" src="data/nextTourDataManger.js" defer></script>
    <script type="module" src="data/tourGalleryManager.js" defer></script>
  </head>

          <button id="navHeaderBtn" title="Navigationsleiste">
            <img
              class="navHeaderBtnIcon"
              src="assets/icons/sidebar.svg"
              alt="Sidebar Icon"

        </div>
        <ul class="navList">
          <li class="navListItem">
            <a
              href=""
              class="navListItemBtn navListItemBtnActive"

              <span class="navListItemText">Ranking</span></a

          <li class="navListItem">
            <a href="" class="navListItemBtn" title="Routen Vorschläge">
              <svg
                class="navListItemIcon"
                xmlns:xlink="http://www.w3.org/1999/xlink"

                  stroke-linejoin="round"

              ><span class="navListItemText">Routen Vorschläge</span></a
            >
          </li>
        </ul>
        <div class="sidebarBtnCon">
          <button
            class="sidebarBtn"
            id="createTourBtn"
            title="Tour erstellen"
            hidden
          >
            <img
              class="sidebarBtnIcon"
              src="assets/icons/add.svg"
              alt="add-Tour-Icon"
            /><span class="sidebarBtnText">Tour</span>
          </button>
          <button class="sidebarBtn" id="signOutBtn" title="Abmelden" hidden>
            <img
              class="sidebarBtnIcon"
              src="assets/icons/log-out.svg"
              alt="signOut-Icon"
            /><span class="sidebarBtnText">Abmelden</span>
          </button>
        </div>
        <div class="infoCon">
          <div class="infoConHeader">
            <span class="infoConHeaderTitle">Nächste Tour</span>
            <div class="infoConHeaderInfo loading">
              <span class="infoConHeaderInfoCount">0</span>
              <img
                class="infoConHeaderInfoIcon"
                src="assets/icons/user.svg"
                alt="user-Icon"
              />
            </div>
          </div>
          <div class="infoConText loading">
            <span id="infoConDestination">Routen Ziel</span>
            <span id="infoConDate">Wochentag, 00. Monat</span>
            <span id="infoConInfo">00km, 0.0h - Information</span>
          </div>
          <div class="infoConBtnCon loading">
            <a id="infoConBtn">Route</a>
            <button id="infoConVoteBtn">
              <svg
                class="infoConVoteBtnIcon"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="m8.5 12.512 2.341 2.339A14.985 14.985 0 0 1 15.4 9.915l.101-.069M12 21c-2.796 0-4.193 0-5.296-.457a6 6 0 0 1-3.247-3.247C3 16.194 3 14.796 3 12c0-2.796 0-4.193.457-5.296a6 6 0 0 1 3.247-3.247C7.807 3 9.204 3 12 3c2.796 0 4.194 0 5.296.457a6 6 0 0 1 3.247 3.247C21 7.807 21 9.204 21 12c0 2.796 0 4.194-.457 5.296a6 6 0 0 1-3.247 3.247C16.194 21 14.796 21 12 21Z"
                />
              </svg>
            </button>
          </div>
        </div>
      </div>
    </nav>
    <main>
      <span class="tourListConTitle" id="galleryTitle">Galerie</span>
      <div id="galleryContainer"></div>
      <div class="uidInfoCon">
        <span id="uidInfoText"></span>
      </div>
    </main>
    <div class="createNewTourCon isHidden">
      <div class="createNewTourBox">
        <div class="createNewTourHeader">
          <span class="createNewTourTitle"
            ><img
              class="createNewTourTitleIcon"
              src="assets/icons/calendar.svg"
              alt="add-Tour-Icon"
            />Neue Tour erstellen
          </span>
          <button id="createNewTourCloseBtn" title="Schließen">
            <img
              class="createNewTourBtnIcon"
              src="assets/icons/close.svg"
              alt="Sidebar Icon"
            />
          </button>
        </div>
        <div class="createNewTourInputCon">
          <span class="createNewTourInputTitle"> Zielort </span>
          <input
            class="createNewTourInput"
            id="destinationInput"
            type="text"
            placeholder="Musterort"
            required
          />
          <span class="createNewTourInputTitle"> Datum </span>
          <input
            class="createNewTourInput"
            id="dateInput"
            type="text"
            placeholder="Tag, 00. Monat"
            required
          />
          <span class="createNewTourInputTitle">
            Zusatzinformation (z.B. Entfernung, Dauer, etc.)
          </span>
          <input
            class="createNewTourInput"
            id="informationInput"
            type="text"
            placeholder="00 km, 0.0 h - Zusatzinformation"
            required
          />
          <span class="createNewTourInputTitle"> Routen Link </span>
          <input
            class="createNewTourInput"
            id="routeInput"
            type="text"
            placeholder="Routen Planer Link"
            required
          />
          <button id="createNewTourBtn">Erstellen</button>
        </div>
      </div>
    </div>
  </body>
</html>
