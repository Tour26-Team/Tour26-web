<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign in - Tour26</title>
    <link rel="stylesheet" href="styles/index.css" />
    <link rel="icon" href="assets/logo/Tour26_Logo_Small.png" />

    <script type="module" src="auth/authManager.js" defer></script>
  </head>
  <body>
    <main>
      <div class="authenticationHeader">
        <img
          class="authenticationHeaderLogo"
          src="assets/logo/Tour26_Transparent_low.png"
          alt="Tour26 Logo"
        />
      </div>
      <div class="authenticationContent">
        <div class="authenticationBox">
          <span class="authenticationTitle">Mit Account Anmelden</span>
          <div class="authenticationInputCon">
            <input
              class="authenticationInput"
              id="authenticationEmailInput"
              type="email"
              placeholder="E-Mail Adresse"
              required
            />
            <input
              class="authenticationInput"
              id="authenticationPasswordInput"
              type="password"
              placeholder="Passwort"
              required
            />
            <button class="authenticationSubmitBtn" id="authenticationSignInBtn">Anmelden</button>
          </div>
          <a class="authenticationLink" href="register.html"
            >Order neuen
            <span class="authenticationLinkU">Account erstellen.</span></a
          >
        </div>
      </div>
    </main>
  </body>
</html>
